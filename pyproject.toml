[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["src/tests"]

[tool.black]
line-length = 88
target-version = ["py311"]
extend-exclude = '''
/(
    \.venv
  | \.git
  | __pycache__
  | build
  | dist
)/
'''

[tool.mypy]
python_version = "3.11"
files = ["src"]
exclude = ['\.venv/', 'src/notebooks/']
warn_unused_ignores = true
warn_redundant_casts = true
ignore_missing_imports = true

[tool.bandit]
exclude_dirs = [".venv", "src/tests", "src/notebooks"]
